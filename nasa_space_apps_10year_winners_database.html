      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      border-color: var(--color-border-secondary);
      font-weight: 500;
    }

      display: inline-block;

      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

      background: #E1F5EE;
      color: #0F6E56;
    }

      color: #BA7517;
    }

    .b-bd {

    .year-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
    }

    .row {
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding: 10px 8px;
      display: grid;
      grid-template-columns: 90px 120px 120px 100px 100px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 12px;
      transition: background 0.1s;
    }

    .row:hover {
      background: var(--color-background-secondary);
      border-radius: 6px;
    }

    .row.hidden {
      display: none;
    }

    .th {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      padding: 8px 8px 10px;
      display: grid;
      grid-template-columns: 90px 120px 120px 100px 100px 1fr;
      gap: 8px;
      border-bottom: 0.5px solid var(--color-border-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat-card {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 10px 14px;
      text-align: center;
    }

    const catBadge = {
      tech: 'b-tech', sci: 'b-sci', data: 'b-data', galactic: 'b-galactic', mission: 'b-mission',
      inspo: 'b-inspo', story: 'b-story', art: 'b-art', local: 'b-local', global: 'b-global', hw: 'b-hw'
    };
    const catLabel = {
      tech: '🔧 Technology', sci: '🔬 Science', data: '📊 Data', galactic: '🌍 Galactic Impact',
      mission: '🚀 Mission Concept', inspo: '💡 Most Inspirational', story: '📖 Storytelling',
      art: '🎨 Art & Tech', local: '📍 Local Impact', global: '🌐 Global Connection', hw: '⚙️ Hardware'
    };

    let activeYear = 'all';
    let activeCat = 'all';

    function renderTable() {
      const search = document.getElementById('search-box').value.toLowerCase();
      const body = document.getElementById('table-body');
      body.innerHTML = '';
      let count = 0;
      winners.forEach(w => {
        const yearMatch = activeYear === 'all' || w.year.includes(activeYear);
        const catMatch = activeCat === 'all' || (activeCat === 'bd' ? w.bd : w.cat === activeCat);
        const searchMatch = !search || w.team.toLowerCase().includes(search) || w.desc.toLowerCase().includes(search) || w.country.toLowerCase().includes(search) || w.award.toLowerCase().includes(search);
        if (yearMatch && catMatch && searchMatch) {
          count++;
          const row = document.createElement('div');
          row.className = 'row';
          const bc = catBadge[w.cat] || 'b-data';
          const cl = catLabel[w.cat] || w.award;
          row.innerHTML = `
        <span class="year-tag">${w.year}</span>
        <div>
          <div style="font-weight:500;color:var(--color-text-primary);font-size:12px;">${w.team}</div>
          ${w.bd ? '<span class="badge b-bd">🇧🇩 BD Winner</span>' : ''}
        </div>
        <div><span class="badge ${bc}">${w.award.replace('Best Use of ', '').replace('Best ', '')}</span></div>
        <div style="font-size:11px;color:var(--color-text-secondary);">${w.hub}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);">${w.country}</div>
        <div style="color:var(--color-text-secondary);font-size:11px;line-height:1.5;">${w.desc}</div>
      `;
          body.appendChild(row);
        }
      });
      document.getElementById('result-count').textContent = `${count}টি এন্ট্রি দেখানো হচ্ছে`;
      document.getElementById('total-count').textContent = count;
    }

    function filterTable() { renderTable(); }

    function setFilter(type, val, btn) {
      if (type === 'year') {
        activeYear = val;
        document.querySelectorAll('.filter-btn').forEach(b => {
          if (['সব', '2025', '2024', '2023', '2022', '2021', '2020', '2019', '2018', '2017', '2016'].some(y => b.textContent === y)) b.classList.remove('active');
        });
      } else {
        activeCat = val;
        document.querySelectorAll('.filter-btn').forEach(b => {
          const catBtns = ['সব', '🔧 Technology', '🔬 Science', '📊 Data', '🌍 Galactic', '🚀 Mission', '💡 Inspirational', '🇧🇩 Bangladesh'];
          if (catBtns.some(c => b.textContent.trim() === c.trim())) b.classList.remove('active');
        });
      }
      btn.classList.add('active');
      renderTable();
    }

    renderTable();
  </script>
